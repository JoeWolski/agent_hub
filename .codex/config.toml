# .codex/config.toml
# Repo defaults for agentic development.

model = "gpt-5.4"
model_reasoning_effort = "high"
sandbox_mode = "workspace-write"

[features]
collaboration_modes = true
multi_agent = true

[agents]
max_threads = 8
max_depth = 1

[agents.spec_owner]
description = "Owns requirements/decisions and merges the implementation-ready document set. Spawns sub-agents for audits and review."
config_file = "agents/spec-owner.toml"

[agents.spec_reviewer]
description = "Adversarial Spark reviewer for specs and implementation; finds ambiguity, bugs, bad architecture, missing class-level details, and untestable requirements."
config_file = "agents/spec-reviewer.toml"

[agents.naive_implementer]
description = "Simulates a naive implementer using ONLY the spec docs; outputs blocking questions and missing detail diffs."
config_file = "agents/naive-implementer.toml"

[agents.explorer]
description = "Read-only codebase and docs explorer. Evidence-first; no fixes unless requested."
config_file = "agents/explorer.toml"

[agents.worker]
description = "Spark implementation agent. Takes owned slices of the ExecPlan, starts with the largest/highest-risk changes, runs ./make.sh validation, and reports failures clearly."
config_file = "agents/worker.toml"
